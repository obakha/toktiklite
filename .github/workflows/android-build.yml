name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android command-line tools and SDK packages
        run: |
          set -e
          SDK_ROOT="$RUNNER_TEMP/android-sdk"
          sudo apt-get update
          sudo apt-get install -y unzip wget
          mkdir -p "$SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline.zip
          unzip -q /tmp/cmdline.zip -d /tmp/cmdline
          mkdir -p "$SDK_ROOT/cmdline-tools/latest"
          mv /tmp/cmdline/cmdline-tools/* "$SDK_ROOT/cmdline-tools/latest/"
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --sdk_root="$SDK_ROOT" --licenses > /dev/null
          sdkmanager --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-36" "build-tools;35.0.0"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "$SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "sdk.dir=$SDK_ROOT" > local.properties

      # This repo does not check in gradlew/gradlew.bat/gradle-wrapper.jar, only
      # gradle/wrapper/gradle-wrapper.properties (the version pin). gradle-build-action reads
      # that file and provisions the matching Gradle distribution itself, so builds are
      # reproducible without a committed wrapper binary. If you'd rather commit a wrapper
      # script for local `./gradlew` use, run `gradle wrapper --gradle-version 8.11.1` once
      # from a local Gradle install and commit the generated gradlew/gradlew.bat files.
      - name: Build debug APK
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.11.1'
          arguments: assembleDebug --stacktrace
          cache-disabled: false

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"
          fi

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: gradle/gradle-build-action@v3
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        with:
          gradle-version: '8.11.1'
          arguments: >
            assembleRelease --stacktrace
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore
            -Pandroid.injected.signing.store.password=${{ secrets.RELEASE_STORE_PASSWORD }}
            -Pandroid.injected.signing.key.alias=${{ secrets.RELEASE_KEY_ALIAS }}
            -Pandroid.injected.signing.key.password=${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
